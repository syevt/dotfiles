  - &right 'ZDIAnQAxZAA='
  - &up 'OWQAyioAZAA='
  - &down 'MAAAMDNkZAA='

  - &right_then_down 'ADAA/l8oUQlkKlUyYztkAA=='
  - &left_then_up 'VWMAYw5kKdMXKEzOFgBkAA=='
  - &left_then_down 'ZCMAYwAmTzEAQGQA'
  - &down_then_right 'AA4ALQhRKQFkVWFkYFVkAA=='

  - &top_right_to_bottom_left 'ZBEAVC4tMk4AUmQA'
  - &bottom_right_to_top_left 'ZFkArCk5Mr4ZHkqyAApkAA=='
  - &bottom_left_to_top_right 'AFgA7GQLZAA='

  - &tilde 'AD0A4AsrD/gYJxoWOkQ66mQfZAA='

  - &letter_a 'Uy8A2VkdBcVXFQixQgQPpC8AFWMfABlUDwkfNwojJyYXRjEVJFA2AC9QOelJOETSTBdNMU1PXShUZGQA'
  - &letter_e 'Bi4AADwvEOVPGhnNTQgeni0GKFYXEDBMBh83OQA9QBcYU0oIPl1WAExdWutkS2QA'
  - &letter_f 'ECAAADwfE+hTCSGnNwAvUykHNj4kFTwhQktYNT9kZAA='
  - &letter_o 'KxgA+EASBxJjKhYxZDwcQldRJVFNVyljMFczqxJJP7YANkjNAClN3QYdUfAZEln5NQxj5zUMZAA='
  - &letter_s 'SBkAwkQPA6cqBgyeHAYRORkRFSEmKB0MZEEzSExdP50xXUitGE1StAA3XNwELmADEC9kAA=='
  - &letter_w 'ABwA0AAZAR8GIwYkHVMb2jMVNSs6NEEhRUhK2Ug+TuNdIVzaZBBkAA=='

  - &kpat_shape 'GE4A61AhGN9YEh2dABA7FxIgQxNJRlkOZFNjxGNTZAA='

mouse:
  gestures:
    - type: stroke
      strokes: [ *left ]
      mouse_buttons: [ right ]
      actions:
        - command: niri msg action focus-column-left

    - type: stroke
      strokes: [ *right ]
      mouse_buttons: [ right ]
      actions:
        - command: niri msg action focus-column-right

    - type: stroke
      strokes: [ *up ]
      mouse_buttons: [ right ]
      actions:
        - command: niri msg action focus-window-or-workspace-down

    - type: stroke
      strokes: [ *down ]
      mouse_buttons: [ right ]
      actions:
        - command: niri msg action focus-window-or-workspace-up

    - type: stroke
      strokes: [ *left_then_up ]
      mouse_buttons: [ right ]
      actions:
        - command: niri msg action open-overview

    - type: stroke
      strokes: [ *down_then_right ]
      mouse_buttons: [ right ]
      actions:
        - command: niri msg action close-window

    - type: stroke
      strokes: [ *top_right_to_bottom_left ]
      mouse_buttons: [ right ]
      actions:
        - command: niri msg action switch-preset-column-width

    - type: stroke
      strokes: [ *bottom_left_to_top_right ]
      mouse_buttons: [ right ]
      actions:
        - command: niri msg action maximize-column

    - type: stroke
      strokes: [ *tilde ]
      mouse_buttons: [ right ]
      actions:
        - command: niri msg action toggle-window-floating

    - type: stroke
      strokes: [ *letter_a ]
      mouse_buttons: [ right ]
      actions:
        - command: audacious

    - type: stroke
      strokes: [ *letter_e ]
      mouse_buttons: [ right ]
      actions:
        - command: pcmanfm

    - type: stroke
      strokes: [ *letter_f ]
      mouse_buttons: [ right ]
      actions:
        - command: firefox

    - type: stroke
      strokes: [ *kpat_shape ]
      mouse_buttons: [ right ]
      actions:
        - command: kpat

    - type: stroke
      strokes: [ *letter_o ]
      mouse_buttons: [ right ]
      actions:
        - command: okular

    - type: stroke
      strokes: [ *letter_s ]
      mouse_buttons: [ right ]
      actions:
        - command: signal-desktop --use-tray-icon --enable-features=UseOzonePlatform --ozone-platform=wayland --enable-features=WaylandWindowDecorations

    - type: stroke
      strokes: [ *letter_w ]
      mouse_buttons: [ right ]
      actions:
        - command: chromium --app=https://web.whatsapp.com --user-data-dir=/home/syevt/.config/chromium-whatsapp --ozone-platform=wayland --enable-features=UseOzonePlatform

    - type: stroke
      strokes: [ *bottom_right_to_top_left ]
      mouse_buttons: [ right ]
      actions:
        - input:
          # in DVORAK it means `Ctrl+W`: close browser tab
          - keyboard: [ leftctrl+comma ]

    - type: stroke
      strokes: [ *left_then_down ]
      mouse_buttons: [ right ]
      actions:
        - input:
          # in DVORAK it means `Ctrl+Z`: undo
          - keyboard: [ leftctrl+slash ]

    - type: stroke
      strokes: [ *right_then_down ]
      mouse_buttons: [ right ]
      actions:
        - input:
          # in DVORAK it means `Ctrl+Shift+Z`: redo
          - keyboard: [ leftctrl+leftshift+slash ]
