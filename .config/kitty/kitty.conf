# --- Colors ---
foreground #ebdbb2
background #202020

# normal colors
color0  #1d1d1d
color1  #cc241d
color2  #427b58
color3  #ffaf00
color4  #076678
color5  #b16286
color6  #689d6a
color7  #a89984

# bright colors
color8  #928373
color9  #fb4833
color10 #b8ba25
color11 #cc241d
color12 #83a597
color13 #d3859a
color14 #8ec07b
color15 #ebdbb2


# --- Cursor ---
cursor_shape block
cursor_beam_thickness 3.0
cursor_blink_interval 0
cursor_stop_blinking_after 0
cursor_trail 10
cursor_trail_start_threshold 2
cursor_trail_decay 0.1 0.4
cursor_trail_color none


# --- Font ---
font_family      Rec Mono Casual
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size 18.0


# --- Window ---
# background_opacity 0.95
window_padding_width 4


# --- Behavior ---
term xterm-256color
enable_audio_bell no


# --- Optional (close-ish to your intent) ---

# make cursor visible even when unfocused (kitty does this differently)
cursor_unfocused_hollow yes

# slight vertical tweak (only thing kitty allows)
adjust_line_height 0
adjust_baseline 0

map ctrl+equal change_font_size all +0.5
map ctrl+minus change_font_size all -0.5
